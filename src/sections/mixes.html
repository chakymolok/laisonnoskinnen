<section id="mixes" class="section container-x" data-player>
  <div class="hr-line mb-10"></div>
  <div class="flex justify-between items-baseline mono mb-12 md:mb-16">
    <span class="section-num">03 / SELECTED MIXES</span>
    <span class="section-num hidden md:inline">PRESS SPACE TO PLAY</span>
  </div>

  <h2 data-reveal="chars" class="display max-w-5xl mb-6" style="font-size: clamp(48px, 8vw, 120px);">
    Listen.
  </h2>
  <p data-reveal="words" class="max-w-2xl text-mute text-base md:text-lg mb-12 md:mb-16">
    Подборка миксов от Лайсо и совместных b2b-сетов. Ниже — реальные записи, можно слушать прямо здесь.
  </p>

  <div class="grid grid-cols-12 gap-6 md:gap-10">
    <!-- Now playing block -->
    <div class="col-span-12 lg:col-span-7 border border-line p-5 md:p-8 bg-bg/30 backdrop-blur-sm">
      <div class="flex items-baseline justify-between mb-6">
        <div class="flex items-baseline gap-3">
          <span class="font-mono text-xs text-mute" data-player-num>01</span>
          <span class="mono" data-player-format>VINYL</span>
        </div>
        <a class="link mono" data-player-external href="#" target="_blank" rel="noopener">external →</a>
      </div>

      <div class="mb-2">
        <h3 data-player-title class="display text-3xl md:text-5xl leading-none">—</h3>
      </div>
      <div class="flex flex-wrap items-baseline gap-x-3 gap-y-1 mb-6">
        <span data-player-artist class="text-fg/85"></span>
        <span class="text-mute mono" data-player-tags></span>
      </div>

      <div id="waveform" class="mb-4"></div>

      <div class="flex items-center justify-between mb-6 mono">
        <span data-player-current>00:00</span>
        <span data-player-duration>00:00</span>
      </div>

      <div class="flex items-center justify-center gap-6">
        <button data-player-prev type="button" aria-label="Previous track" class="h-12 w-12 inline-flex items-center justify-center text-mute hover:text-fg transition-colors" data-magnetic data-cursor="prev">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="18 4 6 12 18 20 18 4"/><rect x="4" y="4" width="2" height="16"/></svg>
        </button>
        <button data-player-play type="button" aria-label="Play" class="player-play" data-magnetic data-cursor="play"></button>
        <button data-player-next type="button" aria-label="Next track" class="h-12 w-12 inline-flex items-center justify-center text-mute hover:text-fg transition-colors" data-magnetic data-cursor="next">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><polygon points="6 4 18 12 6 20 6 4"/><rect x="18" y="4" width="2" height="16"/></svg>
        </button>
      </div>
    </div>

    <!-- Track list -->
    <div class="col-span-12 lg:col-span-5 border border-line">
      <div class="flex justify-between items-baseline px-4 py-3 mono border-b border-line">
        <span>TRACKLIST</span>
        <span data-track-count></span>
      </div>
      <div data-player-list></div>
    </div>
  </div>

  <div class="mt-10 flex flex-wrap items-center gap-3 md:gap-4">
    <a class="btn btn-ghost" href="https://promodj.com/laisobuck" target="_blank" rel="noopener" data-magnetic data-cursor="open">
      Все миксы на promodj <span aria-hidden="true">→</span>
    </a>
    <a class="btn btn-ghost" href="https://www.mixcloud.com/LaisoBuck/" target="_blank" rel="noopener" data-magnetic data-cursor="open">
      Mixcloud <span aria-hidden="true">→</span>
    </a>
  </div>
</section>
