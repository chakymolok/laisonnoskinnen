<section id="hero" class="relative min-h-[100svh] overflow-hidden flex flex-col justify-end container-x pb-12 md:pb-16">
  <div class="hero-pulse" aria-hidden="true"></div>

  <!-- Top meta -->
  <div class="absolute top-6 left-0 right-0 container-x flex flex-wrap items-center gap-x-6 gap-y-2 z-10">
    <span class="inline-flex items-center gap-2 mono">
      <span class="live-dot" aria-hidden="true"></span>
      <span data-hero-scramble>ON AIR</span>
    </span>
    <span class="mono" data-hero-scramble>BACK-TO-BACK DUO</span>
    <span class="mono" data-hero-scramble>MOSCOW</span>
    <span class="mono" data-hero-scramble>EST. 2002</span>
  </div>

  <!-- Title -->
  <h1 class="display relative z-10 leading-[0.92]" style="font-size: clamp(48px, 15vw, 260px);">
    <span class="block whitespace-nowrap" aria-label="LAISO">
      <span data-hero-char class="inline-block">L</span><span data-hero-char class="inline-block">A</span><span data-hero-char class="inline-block">I</span><span data-hero-char class="inline-block">S</span><span data-hero-char class="inline-block">O</span>
    </span>
    <span class="block whitespace-nowrap" aria-label="& NOSKINNEN">
      <span data-hero-char class="inline-block text-accent italic" style="font-style: italic;">&amp;</span><span class="inline-block">&nbsp;</span><span data-hero-char class="inline-block">N</span><span data-hero-char class="inline-block">O</span><span data-hero-char class="inline-block">S</span><span data-hero-char class="inline-block">K</span><span data-hero-char class="inline-block">I</span><span data-hero-char class="inline-block">N</span><span data-hero-char class="inline-block">N</span><span data-hero-char class="inline-block">E</span><span data-hero-char class="inline-block">N</span>
    </span>
  </h1>

  <!-- Subline -->
  <div class="relative z-10 mt-8 md:mt-10 max-w-3xl">
    <p data-hero-sub class="font-display text-2xl md:text-[32px] leading-tight">
      Two selectors. Any time. Any music.
    </p>
    <p data-hero-sub class="text-mute text-base md:text-lg mt-3 max-w-xl">
      Любая музыка. Любая ночь. Свой звук, свой свет, свой подход.
    </p>
  </div>

  <!-- CTA -->
  <div class="relative z-10 mt-10 flex flex-wrap items-center gap-3 md:gap-4">
    <a data-hero-cta href="#booking" class="btn btn-primary" data-magnetic data-cursor="book">
      Забронировать вечер
      <span aria-hidden="true">→</span>
    </a>
    <a data-hero-cta href="#mixes" class="btn btn-ghost" data-magnetic data-cursor="play">
      Послушать сеты
    </a>
  </div>

  <!-- Bottom corners -->
  <div class="relative z-10 mt-16 md:mt-20 flex items-end justify-between mono">
    <span>[01]</span>
    <span class="hidden md:inline">[scroll ↓]</span>
  </div>
</section>
